<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐔 Chicken Party</title>
<style>
  /* =============================================
     DESIGN: Playful retro-arcade on dark felt,
     neon yolk-yellow + hot coral accents,
     big chunky typography, zero external deps.
  ============================================= */
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --bg:        #0d0d0d;
    --panel:     #181818;
    --border:    #2a2a2a;
    --yellow:    #ffe94d;
    --coral:     #ff5f5f;
    --green:     #4dffb4;
    --dim:       #555;
    --text:      #f0f0f0;
    --radius:    18px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- Animated background grain ---- */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 150px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100dvh;
    padding: 28px 20px 36px;
    max-width: 420px;
    margin: 0 auto;
  }

  /* ---- Header ---- */
  .header {
    text-align: center;
  }
  .emoji-title {
    font-size: clamp(52px, 16vw, 80px);
    line-height: 1;
    filter: drop-shadow(0 0 16px #ffe94d88);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-8px) rotate(4deg); }
  }
  .app-title {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(34px, 11vw, 56px);
    color: var(--yellow);
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 #a06800, 0 0 24px #ffe94d55;
    line-height: 1.1;
    margin-top: 4px;
  }
  .app-subtitle {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ---- Meter ring ---- */
  .meter-wrap {
    position: relative;
    width: min(220px, 58vw);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .meter-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .meter-track { fill: none; stroke: var(--border); stroke-width: 10; }
  .meter-fill  {
    fill: none;
    stroke: var(--yellow);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 0 1000;
    transition: stroke-dasharray 0.12s ease, stroke 0.12s ease;
    filter: drop-shadow(0 0 6px var(--yellow));
  }
  .meter-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .meter-value {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(38px, 12vw, 56px);
    color: var(--yellow);
    line-height: 1;
    text-shadow: 0 0 20px var(--yellow);
    transition: color 0.15s ease;
  }
  .meter-label {
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ---- Status pill ---- */
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--panel);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-pill.active {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 16px #4dffb433;
  }
  .status-pill.active .status-dot {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 0.9s ease-in-out infinite;
  }
  .status-pill.panic {
    border-color: var(--coral);
    color: var(--coral);
    box-shadow: 0 0 20px #ff5f5f55;
  }
  .status-pill.panic .status-dot {
    background: var(--coral);
    box-shadow: 0 0 10px var(--coral);
    animation: pulse-dot 0.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(1.5); }
  }

  /* ---- Bars (debug stats) ---- */
  .stats-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .stat-box {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Boogaloo', cursive;
    font-size: 22px;
    color: var(--yellow);
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ---- Start button ---- */
  .btn-start {
    width: 100%;
    padding: 20px;
    border-radius: var(--radius);
    border: none;
    background: var(--yellow);
    color: #1a0e00;
    font-family: 'Boogaloo', cursive;
    font-size: clamp(22px, 6vw, 30px);
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 0 #a06800, 0 0 30px #ffe94d44;
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-start:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #a06800, 0 0 14px #ffe94d44;
  }
  .btn-start::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-start.stop {
    background: var(--coral);
    box-shadow: 0 6px 0 #8a1a1a, 0 0 30px #ff5f5f33;
    color: #fff;
  }

  /* ---- Ripple on cluck ---- */
  .ripple-ring {
    position: fixed;
    top: 50%; left: 50%;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 3px solid var(--yellow);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    z-index: 99;
  }
  .ripple-ring.burst {
    animation: ripple-burst 0.5s ease-out forwards;
  }
  @keyframes ripple-burst {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.9; }
    100% { transform: translate(-50%,-50%) scale(7); opacity: 0; }
  }

  /* ---- Panic flash overlay ---- */
  .panic-flash {
    position: fixed; inset: 0;
    background: var(--coral);
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.1s;
  }
  .panic-flash.show { opacity: 0.12; }

  /* ---- Error / hint text ---- */
  .hint {
    font-size: 12px;
    color: var(--dim);
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
  }
  .hint a { color: var(--yellow); }
</style>
</head>
<body>

<div class="panic-flash" id="panicFlash"></div>
<div class="ripple-ring"  id="ripple"></div>

<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="emoji-title">🐔</div>
    <div class="app-title">CHICKEN PARTY</div>
    <div class="app-subtitle">Motion Sound Device</div>
  </div>

  <!-- Motion meter ring -->
  <div class="meter-wrap">
    <svg class="meter-svg" viewBox="0 0 100 100">
      <circle class="meter-track" cx="50" cy="50" r="42"/>
      <circle class="meter-fill"  cx="50" cy="50" r="42" id="meterArc"/>
    </svg>
    <div class="meter-center">
      <div class="meter-value" id="meterVal">0</div>
      <div class="meter-label">intensity</div>
    </div>
  </div>

  <!-- Status pill -->
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">IDLE</span>
  </div>

  <!-- Mini stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="statVol">0%</div>
      <div class="stat-lbl">Volume</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statSpeed">1.0x</div>
      <div class="stat-lbl">Speed</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statDelay">—</div>
      <div class="stat-lbl">Delay</div>
    </div>
  </div>

  <!-- CTA -->
  <div style="width:100%; display:flex; flex-direction:column; gap:12px; align-items:center;">
    <button class="btn-start" id="btnStart">🐔 START GAME</button>
    <p class="hint" id="hintText">Tap START to grant motion permission and begin.<br>
      Works best over <strong>HTTPS</strong> (required on iOS Safari).</p>
  </div>

</div>

<script>
/* ============================================================
   CHICKEN PARTY — Motion-Detection Sound Device
   ============================================================
   Architecture:
     1. Motion Detection  — devicemotion event → magnitude + delta
     2. Smoothing         — exponential moving average (EMA)
     3. Normalization     — clamp 0-MAX_MAG → 0-1
     4. Audio Engine      — Web Audio API (BufferSource + GainNode)
     5. Game Logic        — panic mode, anti-cheat, trigger timing
   ============================================================ */

// ---- DOM refs ----
const btnStart   = document.getElementById('btnStart');
const statusPill = document.getElementById('statusPill');
const statusText = document.getElementById('statusText');
const meterVal   = document.getElementById('meterVal');
const meterArc   = document.getElementById('meterArc');
const statVol    = document.getElementById('statVol');
const statSpeed  = document.getElementById('statSpeed');
const statDelay  = document.getElementById('statDelay');
const hintText   = document.getElementById('hintText');
const rippleEl   = document.getElementById('ripple');
const panicFlash = document.getElementById('panicFlash');

// ---- Constants ----
const CIRCUMFERENCE = 2 * Math.PI * 42;   // SVG ring circumference (r=42)
const MAX_MAG       = 30;   // magnitude (|x|+|y|+|z|) considered "full throttle"
const MAX_DELTA     = 20;   // delta considered "max speed change"
const EMA_ALPHA     = 0.25; // smoothing factor: higher = more reactive
const PANIC_THRESH  = 0.4;  // normalised magnitude to start accumulating panic
const PANIC_RATE    = 0.0004;// how fast panic builds per motion frame
const PANIC_DECAY   = 0.001; // how fast panic decays when still
const CHEAT_THRESH  = 0.05;  // if norm mag < this for a while, maybe sneaking
const CHEAT_WINDOW  = 3000;  // ms of "suspiciously low" movement before cheat trigger

// ---- State ----
let audioCtx     = null;
let chickenBuffer = null;
let isRunning    = false;

let prevMag      = 0;        // previous raw magnitude
let smoothMag    = 0;        // EMA-smoothed magnitude
let smoothDelta  = 0;        // EMA-smoothed rate-of-change

let lastTrigger  = 0;        // timestamp of last sound trigger
let triggerDelay = 600;      // dynamic delay between triggers (ms)

let panicLevel   = 0;        // 0-1: accumulated sustained movement
let cheatTimer   = 0;        // ms counter for low-but-nonzero movement

// ============================================================
// 1. AUDIO ENGINE
// ============================================================

/**
 * Initialise AudioContext and fetch+decode chicken.mp3
 * Must be called from a user-gesture handler (iOS requirement).
 */
async function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  try {
    const response = await fetch('chicken.mp3');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const arrayBuffer = await response.arrayBuffer();
    chickenBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    return true;
  } catch (err) {
    hintText.innerHTML = `⚠️ Could not load <b>chicken.mp3</b>. Make sure it's in the same folder as this HTML file and you're serving over HTTP/HTTPS (not file://).`;
    console.error('Audio load error:', err);
    return false;
  }
}

/**
 * Play one chicken cluck with dynamic volume + playbackRate.
 * @param {number} normVol   - normalised volume  [0, 1]
 * @param {number} normSpeed - normalised speed   [0, 1]
 * @param {number} panicBoost - extra gain from panic mode [0, 1]
 */
function playCluck(normVol, normSpeed, panicBoost = 0) {
  if (!audioCtx || !chickenBuffer) return;

  // Resume context if suspended (browser autoplay policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // ---- Volume scaling ----
  // Apply exponential curve (vol^2) so quiet movements stay quiet
  // and fast movements punch through.
  const rawGain  = normVol * normVol;
  const finalGain = Math.min(1, rawGain + panicBoost * 0.35);

  // ---- Playback speed ----
  // Map 0-1 to 0.5–2.5 range with slight random jitter for organic feel
  const jitter      = (Math.random() - 0.5) * 0.15;
  const playbackRate = 0.5 + normSpeed * 2.0 + jitter;

  // ---- Build audio graph: source → gain → destination ----
  const source = audioCtx.createBufferSource();
  const gain   = audioCtx.createGain();

  source.buffer      = chickenBuffer;
  source.playbackRate.value = Math.max(0.3, Math.min(3.0, playbackRate));
  gain.gain.value    = Math.max(0, Math.min(1, finalGain));

  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(0);

  // Visual ripple on every cluck
  triggerRipple(finalGain);
}

// ============================================================
// 2. MOTION DETECTION
// ============================================================

/**
 * devicemotion handler — called ~60 fps on most devices.
 * Computes magnitude (sum of absolute accelerations including gravity)
 * then feeds into smoothing + game logic.
 */
function onMotion(event) {
  if (!isRunning) return;

  // Prefer accelerationIncludingGravity for widest device support
  const acc = event.accelerationIncludingGravity || event.acceleration;
  if (!acc) return;

  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;

  // ---- Raw magnitude: sum of absolute axes ----
  const rawMag = Math.abs(x) + Math.abs(y) + Math.abs(z);

  // ---- Rate of change (delta) ----
  const rawDelta = Math.abs(rawMag - prevMag);
  prevMag = rawMag;

  // ---- Exponential Moving Average (smoothing) ----
  // smoothMag = α * rawMag + (1-α) * smoothMag
  // Reduces sensor noise and false spikes.
  smoothMag   = EMA_ALPHA * rawMag   + (1 - EMA_ALPHA) * smoothMag;
  smoothDelta = EMA_ALPHA * rawDelta + (1 - EMA_ALPHA) * smoothDelta;

  // ---- Normalise to [0, 1] ----
  const normMag   = Math.min(1, smoothMag   / MAX_MAG);
  const normDelta = Math.min(1, smoothDelta / MAX_DELTA);

  // ---- Update game logic ----
  updateGameLogic(normMag, normDelta);

  // ---- Update UI ----
  updateUI(normMag, normDelta);
}

// ============================================================
// 3. GAME LOGIC
// ============================================================

/**
 * Central game loop — called on each motion frame.
 * Controls: trigger timing, panic mode, anti-cheat.
 */
function updateGameLogic(normMag, normDelta) {
  const now = performance.now();

  // ---- Panic mode accumulation ----
  // If the phone has been moving a lot continuously, panic level rises,
  // boosting the baseline volume for a frenetic effect.
  if (normMag > PANIC_THRESH) {
    panicLevel = Math.min(1, panicLevel + PANIC_RATE * normMag);
  } else {
    panicLevel = Math.max(0, panicLevel - PANIC_DECAY);
  }

  // ---- Anti-cheat: detect sneaking ----
  // Someone moving very slowly and consistently low gets a loud surprise.
  if (normMag > 0.01 && normMag < CHEAT_THRESH) {
    cheatTimer += 16; // ~1 frame at 60fps
    if (cheatTimer > CHEAT_WINDOW) {
      // Surprise loud cluck!
      playCluck(0.9, 0.7, 0.5);
      cheatTimer = 0;
    }
  } else {
    cheatTimer = 0;
  }

  // ---- Dynamic trigger delay ----
  // Fast movement → short gap between sounds (min 100ms)
  // Slow movement → long gap (max 600ms)
  // Lerp based on combined magnitude + delta
  const motionFactor = Math.max(normMag, normDelta);
  triggerDelay = 600 - motionFactor * 500; // 100–600ms range

  // ---- Sound trigger ----
  if (normMag > 0.03 && (now - lastTrigger) > triggerDelay) {
    lastTrigger = now;
    const normSpeed = Math.max(normMag, normDelta); // speed drives pitch
    playCluck(normMag, normSpeed, panicLevel);
  }

  // ---- Status text ----
  if (panicLevel > 0.5) {
    setStatus('PANIC!', 'panic');
  } else if (normMag > 0.05) {
    setStatus('ACTIVE', 'active');
  } else {
    setStatus('WAITING', '');
  }

  // ---- Panic screen flash ----
  if (panicLevel > 0.6 && normMag > 0.3) {
    panicFlash.classList.add('show');
    setTimeout(() => panicFlash.classList.remove('show'), 80);
  }
}

// ============================================================
// 4. UI UPDATES
// ============================================================

function updateUI(normMag, normDelta) {
  // ---- Meter ring ----
  const dashLen = CIRCUMFERENCE * normMag;
  meterArc.style.strokeDasharray = `${dashLen} ${CIRCUMFERENCE}`;

  // Colour shifts from yellow → coral as intensity rises
  const r = Math.round(255);
  const g = Math.round(233 - normMag * 180);
  const b = Math.round(77  - normMag * 77);
  meterArc.style.stroke = `rgb(${r},${Math.max(77,g)},${Math.max(0,b)})`;

  // ---- Intensity number ----
  meterVal.textContent = Math.round(normMag * 100);

  // ---- Stat boxes ----
  const vol   = Math.min(1, normMag * normMag + panicLevel * 0.35);
  const speed = 0.5 + Math.max(normMag, normDelta) * 2.0;
  statVol.textContent   = Math.round(vol * 100) + '%';
  statSpeed.textContent = speed.toFixed(1) + 'x';
  statDelay.textContent = Math.round(triggerDelay) + 'ms';
}

function setStatus(text, cls) {
  statusText.textContent = text;
  statusPill.className = 'status-pill ' + cls;
}

function triggerRipple(gain) {
  rippleEl.style.borderColor = gain > 0.6 ? 'var(--coral)' : 'var(--yellow)';
  rippleEl.classList.remove('burst');
  void rippleEl.offsetWidth; // force reflow
  rippleEl.classList.add('burst');
}

// ============================================================
// 5. PERMISSION + START / STOP
// ============================================================

btnStart.addEventListener('click', async () => {
  if (isRunning) {
    stopGame();
    return;
  }
  await startGame();
});

async function startGame() {
  // ---- iOS 13+ requires explicit permission request ----
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm !== 'granted') {
        hintText.textContent = '⚠️ Motion permission denied. Please allow it in Settings → Safari → Motion & Orientation.';
        return;
      }
    } catch (e) {
      hintText.textContent = '⚠️ Permission error: ' + e.message;
      return;
    }
  }

  // ---- Load audio (must happen inside user gesture) ----
  hintText.textContent = '🎵 Loading chicken.mp3…';
  const ok = await initAudio();
  if (!ok) return;

  // ---- Start listening ----
  window.addEventListener('devicemotion', onMotion);
  isRunning  = true;
  panicLevel = 0;
  cheatTimer = 0;
  smoothMag  = 0;
  smoothDelta= 0;

  btnStart.textContent = '🛑 STOP GAME';
  btnStart.classList.add('stop');
  setStatus('WAITING', '');
  hintText.textContent = 'Move the phone to cluck! Keep it in your pocket for the real game 🐔';
}

function stopGame() {
  window.removeEventListener('devicemotion', onMotion);
  isRunning = false;
  panicLevel = 0;

  // Reset UI
  meterArc.style.strokeDasharray = `0 ${CIRCUMFERENCE}`;
  meterVal.textContent = '0';
  statVol.textContent  = '0%';
  statSpeed.textContent= '1.0x';
  statDelay.textContent= '—';
  btnStart.textContent = '🐔 START GAME';
  btnStart.classList.remove('stop');
  setStatus('IDLE', '');
  hintText.innerHTML = 'Tap START to grant motion permission and begin.<br>Works best over <strong>HTTPS</strong> (required on iOS Safari).';
}

// ============================================================
// Fallback: check if DeviceMotion is supported at all
// ============================================================
if (typeof DeviceMotionEvent === 'undefined') {
  hintText.textContent = '⚠️ Your browser does not support DeviceMotion. Try on a real smartphone.';
  btnStart.disabled = true;
  btnStart.style.opacity = '0.4';
}
</script>
</body>
</html>
